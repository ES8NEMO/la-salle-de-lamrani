<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIVE STARS GYM | نظام إدارة المحتوى المرئي</title>
    
    <!-- Preconnect for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    
    <!-- Resources -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Cinzel:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gold': '#D4AF37',
                        'gold-light': '#F5E6A3',
                        'gold-dark': '#8B7424',
                        'deep-black': '#0a0a0a',
                        'card-black': '#111111',
                    },
                    fontFamily: {
                        'cairo': ['Cairo', 'sans-serif'],
                        'cinzel': ['Cinzel', 'serif'],
                    },
                    animation: {
                        'pulse-gold': 'pulseGold 2s ease-in-out infinite',
                        'fadeIn': 'fadeIn 0.5s ease forwards',
                        'slideUp': 'slideUp 0.4s ease forwards',
                    },
                    keyframes: {
                        pulseGold: {
                            '0%, 100%': { opacity: '0.7', transform: 'scale(1)' },
                            '50%': { opacity: '1', transform: 'scale(1.1)' },
                        },
                        fadeIn: {
                            from: { opacity: '0' },
                            to: { opacity: '1' },
                        },
                        slideUp: {
                            from: { opacity: '0', transform: 'translateY(20px)' },
                            to: { opacity: '1', transform: 'translateY(0)' },
                        },
                    },
                }
            }
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
        }

        /* Utility Classes */
        .font-cinzel { font-family: 'Cinzel', serif; }
        .font-cairo { font-family: 'Cairo', sans-serif; }

        /* Gold Text */
        .gold-text {
            background: linear-gradient(135deg, #D4AF37 0%, #F5E6A3 45%, #D4AF37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Sport Cards */
        .sport-card {
            background: #111111;
            border: 1px solid rgba(212,175,55,0.12);
            transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            overflow: hidden;
            border-radius: 1rem;
            cursor: pointer;
        }
        
        .sport-card:hover {
            border-color: rgba(212,175,55,0.5);
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 50px rgba(212,175,55,0.15);
        }
        
        .sport-card::after {
            content: '✏️';
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 20px;
            border: 1px solid #D4AF37;
            color: #D4AF37;
        }
        
        .admin-active .sport-card::after {
            opacity: 1;
        }

        /* Icon Circle */
        .icon-circle {
            width: 4rem;
            height: 4rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(212,175,55,0.08);
            border: 1px solid rgba(212,175,55,0.2);
            transition: all 0.5s ease;
        }
        
        .sport-card:hover .icon-circle {
            background: rgba(212,175,55,0.15);
            border-color: rgba(212,175,55,0.5);
            transform: scale(1.1) rotate(5deg);
        }

        /* Sport Page */
        .sport-page {
            min-height: 100vh;
            background: #0a0a0a;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            overflow-y: auto;
            padding: 2rem;
            transform: translateX(100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .sport-page.active {
            transform: translateX(0);
        }

        /* Admin Mode */
        .admin-active .editable {
            outline: 2px dashed rgba(212,175,55,0.3);
            border-radius: 8px;
            padding: 4px 8px;
            cursor: text;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .admin-active .editable:hover {
            outline: 2px solid rgba(212,175,55,0.8);
            background: rgba(212,175,55,0.05);
        }
        
        .admin-active .editable:focus {
            outline: 3px solid #D4AF37;
            background: rgba(212,175,55,0.1);
        }

        /* Add Image Button */
        .add-image-btn {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: rgba(212,175,55,0.05);
            border: 3px dashed rgba(212,175,55,0.3);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: rgba(212,175,55,0.5);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .add-image-btn:hover {
            border-color: #D4AF37;
            color: #D4AF37;
            background: rgba(212,175,55,0.1);
            transform: scale(1.02);
        }
        
        .add-image-btn i {
            font-size: 3rem;
            animation: pulseGold 2s ease-in-out infinite;
        }

        /* Image Item */
        .image-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        
        .image-item:hover {
            border-color: #D4AF37;
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(212,175,55,0.2);
        }
        
        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .admin-active .image-item:hover .image-overlay {
            opacity: 1;
        }
        
        .image-overlay button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(212,175,55,0.2);
            border: 1px solid #D4AF37;
            color: #D4AF37;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .image-overlay button:hover {
            background: #D4AF37;
            color: #0a0a0a;
            transform: scale(1.1);
        }

        /* Duplicate counter */
        .duplicate-counter {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #D4AF37;
            color: #0a0a0a;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            z-index: 2;
        }

        /* Price Editor */
        .price-editor {
            display: inline-block;
            background: rgba(212,175,55,0.1);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(212,175,55,0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .price-editor:hover {
            background: rgba(212,175,55,0.2);
            border-color: #D4AF37;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #D4AF37;
            border-radius: 4px;
        }

        /* Loading Animation */
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        
        .loading-shimmer {
            animation: shimmer 2s infinite linear;
            background: linear-gradient(to right, #1a1a1a 4%, #2a2a2a 25%, #1a1a1a 36%);
            background-size: 1000px 100%;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-40 bg-deep-black/90 backdrop-blur-md border-b border-gold/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center gap-2 cursor-pointer" onclick="showHome()">
                    <span class="text-gold text-xl">★</span>
                    <span class="font-cinzel text-gold font-bold">FIVE STARS GYM</span>
                </div>
                
                <!-- Admin Login (hidden button) -->
                <button id="admin-login-trigger" class="w-8 h-8 opacity-0 cursor-default"></button>
                
                <!-- Home Button -->
                <button onclick="showHome()" class="text-white/50 hover:text-gold transition-colors">
                    <i class="fas fa-home text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="pt-20 pb-16 px-4 max-w-7xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="font-cinzel text-4xl sm:text-5xl gold-text mb-2">FIVE STARS GYM</h1>
            <p class="font-cairo text-white/40">قاعة العمراني للرياضات القتالية واللياقة البدنية</p>
        </div>

        <!-- Sports Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="sports-grid"></div>
    </div>

    <!-- Sport Page Template -->
    <div id="sport-page" class="sport-page">
        <div class="max-w-7xl mx-auto">
            <!-- Header -->
            <div class="flex items-center justify-between mb-8">
                <button onclick="closeSportPage()" class="flex items-center gap-2 text-white/50 hover:text-gold transition-colors text-lg">
                    <i class="fas fa-arrow-right"></i>
                    <span>العودة للرئيسية</span>
                </button>
                <h2 id="sport-title" class="font-cinzel text-3xl gold-text"></h2>
            </div>

            <!-- Sport Info -->
            <div class="bg-card-black/50 rounded-2xl p-6 mb-8 border border-gold/10">
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <h3 class="font-cinzel text-gold text-xl mb-4">معلومات الرياضة</h3>
                        <div class="space-y-4">
                            <div class="flex items-center gap-3">
                                <i class="fas fa-calendar text-gold/60"></i>
                                <span class="editable font-cairo" id="sport-schedule">المواعيد هنا</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <i class="fas fa-clock text-gold/60"></i>
                                <span class="editable font-cairo" id="sport-time">الأوقات هنا</span>
                            </div>
                        </div>
                    </div>
                    <div>
                        <h3 class="font-cinzel text-gold text-xl mb-4">الأسعار</h3>
                        <div class="space-y-3" id="prices-container"></div>
                    </div>
                </div>
            </div>

            <!-- Image Gallery -->
            <div>
                <h3 class="font-cinzel text-gold text-xl mb-4">معرض الصور</h3>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4" id="sport-gallery"></div>
            </div>
        </div>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="image-upload" multiple accept="image/*" class="hidden">

    <!-- JavaScript -->
    <script>
        (function() {
            'use strict';

            // ========== CONFIG ==========
            const CONFIG = {
                ADMIN_PASSWORD: 'open9966',
                STORAGE_KEY: 'fiveStarsGym_v3',
                MAX_DUPLICATES: 5
            };

            // ========== STATE ==========
            let state = {
                isAdmin: false,
                currentSport: null,
                sports: [
                    { 
                        id: 'kwankido', 
                        name: { en: 'Kwankido', ar: 'كوانكيدو' },
                        icon: 'fa-hand-fist',
                        schedule: 'الثلاثاء — الخميس — السبت',
                        time: '20:30 — 21:30',
                        prices: [
                            { name: 'شهر واحد', value: '100 DH' },
                            { name: '3 أشهر', value: '250 DH' }
                        ],
                        images: []
                    },
                    { 
                        id: 'taekwondo', 
                        name: { en: 'Taekwondo', ar: 'التايكواندو' },
                        icon: 'fa-bolt-lightning',
                        schedule: 'يوميًا',
                        time: 'حسب الفئة العمرية',
                        prices: [
                            { name: 'شهريًا', value: '100 DH' },
                            { name: 'سنويًا', value: '1000 DH' }
                        ],
                        images: []
                    },
                    { 
                        id: 'kickboxing', 
                        name: { en: 'Kickboxing', ar: 'الكيك بوكسينغ' },
                        icon: 'fa-fire-flame-curved',
                        schedule: 'السبت - الاثنين - الأربعاء',
                        time: '19:00 — 21:00',
                        prices: [
                            { name: 'شهريًا', value: '150 DH' },
                            { name: 'شهريين', value: '280 DH' },
                            { name: '3 أشهر', value: '400 DH' }
                        ],
                        images: []
                    },
                    { 
                        id: 'mens-gym', 
                        name: { en: "Men's Gym", ar: 'نادي الرجال' },
                        icon: 'fa-dumbbell',
                        schedule: 'يوميًا',
                        time: '09:00 — 22:00',
                        prices: [
                            { name: 'شهر', value: '150 DH' },
                            { name: '3 أشهر', value: '400 DH' },
                            { name: 'سنة', value: '1000 DH' }
                        ],
                        images: []
                    },
                    { 
                        id: 'womens-gym', 
                        name: { en: "Women's Gym", ar: 'نادي النساء' },
                        icon: 'fa-heart-pulse',
                        schedule: 'يوميًا',
                        time: '10:00 — 21:00',
                        prices: [
                            { name: 'شهر', value: '150 DH' },
                            { name: '3 أشهر', value: '400 DH' }
                        ],
                        images: []
                    }
                ]
            };

            // ========== UTILITIES ==========
            const $ = id => document.getElementById(id);
            const $$ = selector => document.querySelectorAll(selector);

            function showToast(msg, type = 'info') {
                // Simple alert for now - can be enhanced
                alert(msg);
            }

            // ========== STORAGE ==========
            function loadStorage() {
                try {
                    const saved = localStorage.getItem(CONFIG.STORAGE_KEY);
                    if (saved) {
                        const data = JSON.parse(saved);
                        
                        // Restore sports data
                        if (data.sports) {
                            state.sports = data.sports;
                        }
                        
                        // Restore admin state if needed
                        if (data.isAdmin) {
                            setTimeout(() => activateAdmin(), 500);
                        }
                    }
                } catch(e) {
                    console.warn('Failed to load storage:', e);
                }
            }

            function saveStorage() {
                try {
                    localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify({
                        sports: state.sports,
                        isAdmin: state.isAdmin,
                        timestamp: Date.now()
                    }));
                } catch(e) {
                    console.warn('Failed to save storage:', e);
                }
            }

            // ========== ADMIN MODE ==========
            let passwordAttempts = 0;
            const adminTrigger = $('admin-login-trigger');
            
            adminTrigger.addEventListener('click', () => {
                const password = prompt('🔐 أدخل كلمة المرور:', '');
                if (password === CONFIG.ADMIN_PASSWORD) {
                    activateAdmin();
                } else if (password) {
                    passwordAttempts++;
                    if (passwordAttempts >= 3) {
                        alert('❌ تم تجاوز الحد الأقصى للمحاولات');
                        passwordAttempts = 0;
                    } else {
                        alert(`❌ كلمة المرور غير صحيحة (المحاولة ${passwordAttempts}/3)`);
                    }
                }
            });

            function activateAdmin() {
                state.isAdmin = true;
                document.body.classList.add('admin-active');
                
                // Make all prices and text editable
                $$('.editable').forEach(el => {
                    el.setAttribute('contenteditable', 'true');
                    
                    // Save on blur
                    el.addEventListener('blur', () => {
                        saveSportData();
                    });
                });
                
                showToast('✅ وضع الإدارة مفعل - يمكنك تعديل المحتوى بالنقر المباشر');
                saveStorage();
            }

            window.adminLogout = () => {
                state.isAdmin = false;
                document.body.classList.remove('admin-active');
                
                $$('.editable').forEach(el => {
                    el.removeAttribute('contenteditable');
                });
                
                showToast('تم الخروج من وضع الإدارة');
                saveStorage();
            };

            // ========== RENDER SPORTS GRID ==========
            function renderSportsGrid() {
                const grid = $('sports-grid');
                if (!grid) return;
                
                grid.innerHTML = state.sports.map(sport => `
                    <div class="sport-card p-6" onclick="openSportPage('${sport.id}')">
                        <div class="icon-circle text-gold text-2xl mb-4">
                            <i class="fas ${sport.icon}"></i>
                        </div>
                        <h3 class="font-cinzel text-gold text-xl mb-1">${sport.name.en}</h3>
                        <h4 class="font-cairo text-white/50 text-sm mb-4">${sport.name.ar}</h4>
                        <div class="space-y-2 text-sm">
                            <div class="flex items-center gap-2 text-white/60">
                                <i class="fas fa-calendar text-gold/50 w-4"></i>
                                <span class="editable" data-sport="${sport.id}" data-field="schedule">${sport.schedule}</span>
                            </div>
                            <div class="flex items-center gap-2 text-white/60">
                                <i class="fas fa-clock text-gold/50 w-4"></i>
                                <span class="editable" data-sport="${sport.id}" data-field="time">${sport.time}</span>
                            </div>
                            <div class="mt-4 pt-4 border-t border-gold/10">
                                <div class="flex items-center gap-2 text-gold">
                                    <i class="fas fa-tag text-gold/50 w-4"></i>
                                    <span>${sport.prices[0]?.value || 'اتصل بنا'}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // ========== SPORT PAGE ==========
            window.openSportPage = (sportId) => {
                const sport = state.sports.find(s => s.id === sportId);
                if (!sport) return;
                
                state.currentSport = sport;
                const page = $('sport-page');
                
                // Update title
                $('sport-title').textContent = sport.name.ar;
                
                // Update schedule and time
                $('sport-schedule').textContent = sport.schedule;
                $('sport-schedule').dataset.sport = sportId;
                $('sport-schedule').dataset.field = 'schedule';
                
                $('sport-time').textContent = sport.time;
                $('sport-time').dataset.sport = sportId;
                $('sport-time').dataset.field = 'time';
                
                // Render prices
                renderPrices(sport);
                
                // Render gallery
                renderSportGallery(sport);
                
                // Show page
                page.classList.add('active');
                document.body.style.overflow = 'hidden';
            };

            window.closeSportPage = () => {
                $('sport-page').classList.remove('active');
                document.body.style.overflow = '';
                state.currentSport = null;
            };

            function renderPrices(sport) {
                const container = $('prices-container');
                if (!container) return;
                
                container.innerHTML = sport.prices.map((price, index) => `
                    <div class="flex items-center justify-between bg-deep-black/50 p-3 rounded-lg border border-gold/10">
                        <span class="editable font-cairo" 
                              data-sport="${sport.id}" 
                              data-price-index="${index}"
                              data-price-field="name">${price.name}</span>
                        <span class="editable font-cinzel text-gold" 
                              data-sport="${sport.id}" 
                              data-price-index="${index}"
                              data-price-field="value">${price.value}</span>
                    </div>
                `).join('');
            }

            function renderSportGallery(sport) {
                const container = $('sport-gallery');
                if (!container) return;
                
                // Combine existing images with placeholders if admin
                const images = [...sport.images];
                
                // Add placeholder for admin
                if (state.isAdmin) {
                    while (images.length < 10) {
                        images.push(null);
                    }
                }
                
                container.innerHTML = images.map((img, index) => {
                    if (img) {
                        // Count duplicates
                        const duplicates = sport.images.filter(i => i === img).length;
                        
                        return `
                            <div class="image-item">
                                <img src="${img}" alt="صورة ${index + 1}">
                                <div class="duplicate-counter">${duplicates > 1 ? duplicates : ''}</div>
                                ${state.isAdmin ? `
                                    <div class="image-overlay">
                                        <button onclick="duplicateImage(${index})" title="نسخ الصورة">
                                            <i class="fas fa-copy"></i>
                                        </button>
                                        <button onclick="deleteImage(${index})" title="حذف">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    } else if (state.isAdmin) {
                        return `
                            <div class="add-image-btn" onclick="triggerImageUpload(${index})">
                                <i class="fas fa-plus-circle"></i>
                                <span class="text-sm">إضافة صورة</span>
                            </div>
                        `;
                    }
                    return '';
                }).join('');
            }

            // ========== IMAGE HANDLING ==========
            let pendingImageIndex = null;
            
            window.triggerImageUpload = (index) => {
                if (!state.isAdmin || !state.currentSport) return;
                
                pendingImageIndex = index;
                $('image-upload').click();
            };

            $('image-upload').addEventListener('change', (e) => {
                if (!state.isAdmin || !state.currentSport || pendingImageIndex === null) return;
                
                const files = Array.from(e.target.files);
                
                files.forEach(file => {
                    if (!file.type.startsWith('image/')) return;
                    
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        // Add image at the specified index
                        if (pendingImageIndex < state.currentSport.images.length) {
                            state.currentSport.images[pendingImageIndex] = e.target.result;
                        } else {
                            state.currentSport.images.push(e.target.result);
                        }
                        
                        // Allow duplicates (up to 5 times)
                        for (let i = 0; i < CONFIG.MAX_DUPLICATES - 1; i++) {
                            if (confirm('هل تريد إضافة نسخة أخرى من نفس الصورة؟ (يمكنك إضافة حتى 5 نسخ)')) {
                                state.currentSport.images.push(e.target.result);
                            } else {
                                break;
                            }
                        }
                        
                        // Update gallery
                        renderSportGallery(state.currentSport);
                        saveSportData();
                        showToast('✅ تمت إضافة الصورة بنجاح');
                    };
                    reader.readAsDataURL(file);
                });
                
                // Reset
                e.target.value = '';
                pendingImageIndex = null;
            });

            window.duplicateImage = (index) => {
                if (!state.isAdmin || !state.currentSport) return;
                
                const img = state.currentSport.images[index];
                if (img) {
                    state.currentSport.images.push(img);
                    renderSportGallery(state.currentSport);
                    saveSportData();
                    showToast('📸 تم نسخ الصورة');
                }
            };

            window.deleteImage = (index) => {
                if (!state.isAdmin || !state.currentSport) return;
                
                if (confirm('هل أنت متأكد من حذف هذه الصورة؟')) {
                    state.currentSport.images.splice(index, 1);
                    renderSportGallery(state.currentSport);
                    saveSportData();
                    showToast('🗑️ تم حذف الصورة');
                }
            };

            // ========== SAVE DATA ==========
            function saveSportData() {
                // Update sport from editable fields
                $$('.editable').forEach(el => {
                    if (!state.currentSport) return;
                    
                    const sportId = el.dataset.sport;
                    const field = el.dataset.field;
                    const priceIndex = el.dataset.priceIndex;
                    
                    if (sportId && field && !priceIndex) {
                        const sport = state.sports.find(s => s.id === sportId);
                        if (sport) {
                            sport[field] = el.textContent;
                        }
                    } else if (sportId && priceIndex !== undefined) {
                        const sport = state.sports.find(s => s.id === sportId);
                        const priceField = el.dataset.priceField;
                        if (sport && sport.prices[priceIndex]) {
                            sport.prices[priceIndex][priceField] = el.textContent;
                        }
                    }
                });
                
                saveStorage();
            }

            // ========== HOME ==========
            window.showHome = () => {
                closeSportPage();
                renderSportsGrid();
            };

            // ========== INIT ==========
            function init() {
                loadStorage();
                renderSportsGrid();
                
                // Make editable fields save on input
                document.addEventListener('input', (e) => {
                    if (e.target.classList.contains('editable')) {
                        saveSportData();
                    }
                });
            }

            // Start
            document.addEventListener('DOMContentLoaded', init);

        })();
    </script>
</body>
</html>
