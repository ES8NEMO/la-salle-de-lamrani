    <!-- ======================== JAVASCRIPT (مع إصلاح المعاينة المباشرة) ======================== -->
    <script>
    (function() {
        'use strict';

        // ========== STATE ==========
        let isAdmin = false;
        let currentSport = null;
        let adminClickCount = 0;
        let adminTimer = null;
        let editImageIndex = null;
        
        // متغيرات Lightbox
        let currentLightboxImages = [];
        let currentLightboxIndex = 0;
        let lightboxTimer = null;
        
        // بيانات الرياضات
        const sports = [
            { 
                id: 'kwankido', 
                nameEn: 'Kwankido', 
                nameAr: 'كوانكيدو',
                icon: 'fa-hand-fist',
                schedule: 'الثلاثاء — الخميس — السبت',
                time: '20:30 — 21:30',
                prices: [
                    { name: 'شهر واحد', value: '100 DH' },
                    { name: '3 أشهر', value: '250 DH' }
                ],
                ageGroups: [],
                images: []
            },
            { 
                id: 'taekwondo', 
                nameEn: 'Taekwondo', 
                nameAr: 'التايكواندو',
                icon: 'fa-bolt-lightning',
                schedule: 'أيام التدريب',
                time: 'مواعيد متعددة',
                prices: [
                    { name: 'شهر واحد', value: '100 DH' },
                    { name: '3 أشهر', value: '280 DH' },
                    { name: 'سنة', value: '900 DH' }
                ],
                ageGroups: [
                    { range: '4 — 7 سنوات', time: '18:30' },
                    { range: '8 — 12 سنة', time: '19:30' },
                    { range: '12 — 15 سنة', time: '20:30' },
                    { range: '+15 سنة', time: '21:30' }
                ],
                images: []
            },
            { 
                id: 'kickboxing', 
                nameEn: 'Kickboxing', 
                nameAr: 'الكيك بوكسينغ',
                icon: 'fa-fire-flame-curved',
                schedule: 'السبت - الاثنين - الأربعاء',
                time: '19:00 — 21:00',
                prices: [
                    { name: 'شهريًا', value: '150 DH' },
                    { name: 'شهرين', value: '280 DH' },
                    { name: '3 أشهر', value: '400 DH' }
                ],
                ageGroups: [],
                images: []
            },
            { 
                id: 'mens-gym', 
                nameEn: "Men's Gym", 
                nameAr: 'نادي الرجال',
                icon: 'fa-dumbbell',
                schedule: 'يوميًا',
                time: '09:00 — 22:00',
                prices: [
                    { name: 'شهر', value: '150 DH' },
                    { name: '3 أشهر', value: '400 DH' },
                    { name: 'سنة', value: '1000 DH' }
                ],
                ageGroups: [],
                images: []
            },
            { 
                id: 'womens-gym', 
                nameEn: "Women's Gym", 
                nameAr: 'نادي النساء',
                icon: 'fa-heart-pulse',
                schedule: 'يوميًا',
                time: '10:00 — 21:00',
                prices: [
                    { name: 'شهر', value: '150 DH' },
                    { name: '3 أشهر', value: '400 DH' }
                ],
                ageGroups: [],
                images: []
            },
            { 
                id: 'achievements', 
                nameEn: 'Achievements', 
                nameAr: 'الإنجازات',
                icon: 'fa-trophy',
                schedule: 'معرض دائم',
                time: 'مفتوح طوال الوقت',
                prices: [
                    { name: 'الدخول', value: 'مجاني' }
                ],
                ageGroups: [],
                images: [
                    {
                        url: 'https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=400',
                        caption: '🥇 بطولة وطنية 2023'
                    },
                    {
                        url: 'https://images.unsplash.com/photo-1599058917212-d750089bc07e?w=400',
                        caption: '🏆 كأس المدينة'
                    }
                ]
            }
        ];

        // ========== UTILITIES ==========
        const $ = id => document.getElementById(id);
        const $$ = selector => document.querySelectorAll(selector);

        function showToast(msg) {
            const toast = $('toast');
            const toastMsg = $('toast-msg');
            if (!toast || !toastMsg) return;
            
            toastMsg.textContent = msg;
            toast.classList.remove('hidden');
            toast.classList.add('show');
            
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.classList.add('hidden'), 500);
            }, 3000);
        }

        // ========== LIGHTBOX FUNCTIONS ==========
        window.openLightbox = function(images, index) {
            console.log('فتح Lightbox', images, index);
            if (!images || images.length === 0) return;
            
            currentLightboxImages = images;
            currentLightboxIndex = index;
            updateLightbox();
            $('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
            
            // إظهار الأزرار مؤقتاً عند فتح الـ Lightbox
            showLightboxNav();
        };

        window.closeLightbox = function() {
            $('lightbox').classList.remove('active');
            document.body.style.overflow = '';
            
            // إلغاء المؤقت عند الإغلاق
            if (lightboxTimer) {
                clearTimeout(lightboxTimer);
                lightboxTimer = null;
            }
        };

        window.navigateLightbox = function(direction) {
            if (!currentLightboxImages || currentLightboxImages.length === 0) return;
            currentLightboxIndex = (currentLightboxIndex + direction + currentLightboxImages.length) % currentLightboxImages.length;
            updateLightbox();
            
            // إظهار الأزرار مؤقتاً عند التنقل
            showLightboxNav();
        };

        function updateLightbox() {
            if (!currentLightboxImages || currentLightboxImages.length === 0) return;
            const img = currentLightboxImages[currentLightboxIndex];
            const imgUrl = img.url || img;
            $('lightbox-img').src = imgUrl;
            $('lightbox-counter').textContent = `${currentLightboxIndex + 1} / ${currentLightboxImages.length}`;
        }

        // دالة لإظهار الأزرار
        function showLightboxNav() {
            const navButtons = document.querySelectorAll('.lightbox-nav');
            navButtons.forEach(btn => btn.classList.add('visible'));
            
            // إلغاء المؤقت السابق إذا كان موجوداً
            if (lightboxTimer) {
                clearTimeout(lightboxTimer);
            }
            
            // إخفاء الأزرار بعد 3 ثوانٍ
            lightboxTimer = setTimeout(() => {
                navButtons.forEach(btn => btn.classList.remove('visible'));
                lightboxTimer = null;
            }, 3000);
        }

        // دالة جديدة لإخفاء الأزرار فوراً عند الزوم
        function hideLightboxNavImmediately() {
            const navButtons = document.querySelectorAll('.lightbox-nav');
            navButtons.forEach(btn => btn.classList.remove('visible'));
            
            // إلغاء المؤقت إذا كان موجوداً
            if (lightboxTimer) {
                clearTimeout(lightboxTimer);
                lightboxTimer = null;
            }
        }

        // إضافة مستمع حدث resize (للكشف عن الزوم)
        window.addEventListener('resize', function() {
            // التحقق مما إذا كان الـ Lightbox مفتوحاً
            if ($('lightbox') && $('lightbox').classList.contains('active')) {
                hideLightboxNavImmediately();
            }
        });

        // ========== STORAGE ==========
        const BIN_ID = '69b99a0aaa77b81da9f2cebf';
        const API_KEY = '$2a$10$HIZoab3tTM/2LPQAVLeK3.1P.PYxBVAFKNpWMtQOcJq/QfC3Z7/le';
        
        async function loadFromCloud() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: {
                        'X-Master-Key': API_KEY
                    }
                });
                const data = await response.json();
                if (data.record && data.record.sports) {
                    data.record.sports.forEach((savedSport, index) => {
                        if (sports[index]) {
                            sports[index].schedule = savedSport.schedule || sports[index].schedule;
                            sports[index].time = savedSport.time || sports[index].time;
                            sports[index].prices = savedSport.prices || sports[index].prices;
                            sports[index].ageGroups = savedSport.ageGroups || sports[index].ageGroups;
                            if (savedSport.images) {
                                sports[index].images = savedSport.images;
                            }
                        }
                    });
                }
                showToast('✅ تم تحميل البيانات من السحابة');
            } catch(e) {
                console.warn('فشل تحميل البيانات من السحابة:', e);
                loadLocalStorage();
            }
        }

        async function saveToCloud() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify({ sports: sports })
                });
                if (response.ok) {
                    alert('✅ تم حفظ المعلومات في السحابة بنجاح');
                } else {
                    alert('❌ فشل في حفظ المعلومات في السحابة');
                }
            } catch(e) {
                console.warn('فشل حفظ البيانات في السحابة:', e);
                saveLocalStorage();
                alert('✅ تم حفظ المعلومات محلياً');
            }
        }

        function loadLocalStorage() {
            try {
                const saved = localStorage.getItem('gymData');
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.sports) {
                        data.sports.forEach((savedSport, index) => {
                            if (sports[index]) {
                                sports[index].schedule = savedSport.schedule || sports[index].schedule;
                                sports[index].time = savedSport.time || sports[index].time;
                                sports[index].prices = savedSport.prices || sports[index].prices;
                                sports[index].ageGroups = savedSport.ageGroups || sports[index].ageGroups;
                                if (savedSport.images) {
                                    sports[index].images = savedSport.images;
                                }
                            }
                        });
                    }
                }
            } catch(e) {
                console.warn('Storage error:', e);
            }
        }

        function saveLocalStorage() {
            try {
                localStorage.setItem('gymData', JSON.stringify({ sports }));
            } catch(e) {
                console.warn('Save error:', e);
            }
        }

        function updateSportData() {
            if (currentSport) {
                currentSport.schedule = $('sport-schedule').textContent;
                currentSport.time = $('sport-time').textContent;
                
                const priceItems = $$('#prices-container .flex');
                priceItems.forEach((item, index) => {
                    if (currentSport.prices[index]) {
                        const spans = item.querySelectorAll('span');
                        if (spans.length >= 2) {
                            currentSport.prices[index].name = spans[0].textContent;
                            currentSport.prices[index].value = spans[1].textContent;
                        }
                    }
                });
                
                if (currentSport.ageGroups) {
                    const ageItems = $$('#age-groups-list .flex');
                    ageItems.forEach((item, index) => {
                        if (currentSport.ageGroups[index]) {
                            const spans = item.querySelectorAll('span');
                            if (spans.length >= 2) {
                                currentSport.ageGroups[index].range = spans[0].textContent;
                                currentSport.ageGroups[index].time = spans[1].textContent;
                            }
                        }
                    });
                }
            }
        }

        // ========== RENDER SPORTS CARDS ==========
        function renderSportsCards() {
            const container = $('sports-container');
            if (!container) return;
            
            container.innerHTML = sports.map(sport => `
                <div class="service-card rounded-xl p-6 sm:p-8" onclick="openSportPage('${sport.id}')">
                    <div class="icon-circle text-gold text-xl mb-5"><i class="fas ${sport.icon}"></i></div>
                    <h3 class="font-cinzel text-gold text-lg mb-0.5">${sport.nameEn}</h3>
                    <h4 class="font-cairo text-white/50 text-sm mb-5">${sport.nameAr}</h4>
                    <div class="space-y-3 text-sm font-cairo">
                        <div class="flex items-center gap-3 text-white/65">
                            <i class="fas fa-calendar-days text-gold/50 w-5 text-center text-xs"></i>
                            <span>${sport.schedule}</span>
                        </div>
                        <div class="flex items-center gap-3 text-white/65">
                            <i class="fas fa-clock text-gold/50 w-5 text-center text-xs"></i>
                            <span>${sport.time}</span>
                        </div>
                        <div class="mt-5 pt-4 border-t border-gold/10">
                            <div class="flex items-center gap-3 text-gold">
                                <i class="fas fa-tag text-gold/50 w-5 text-center text-xs"></i>
                                <span>${sport.prices[0]?.value || 'اتصل بنا'}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ========== OPEN SPORT PAGE ==========
        window.openSportPage = function(sportId) {
            const sport = sports.find(s => s.id === sportId);
            if (!sport) return;
            
            currentSport = sport;
            
            $('sport-detail-title').textContent = sport.nameAr;
            $('sport-schedule').textContent = sport.schedule;
            $('sport-time').textContent = sport.time;
            
            const pricesContainer = $('prices-container');
            pricesContainer.innerHTML = sport.prices.map((price, index) => `
                <div class="flex items-center justify-between bg-deep-black/50 p-3 rounded-lg border border-gold/10">
                    <span class="editable font-cairo">${price.name}</span>
                    <span class="editable font-cinzel text-gold">${price.value}</span>
                </div>
            `).join('');
            
            const ageGroupsContainer = $('age-groups-container');
            const ageGroupsList = $('age-groups-list');
            
            if (sport.ageGroups && sport.ageGroups.length > 0) {
                ageGroupsContainer.style.display = 'block';
                ageGroupsList.innerHTML = sport.ageGroups.map(group => `
                    <div class="flex justify-between text-white/60 bg-white/5 rounded px-3 py-2">
                        <span class="editable">${group.range}</span>
                        <span class="text-gold editable">${group.time}</span>
                    </div>
                `).join('');
            } else {
                ageGroupsContainer.style.display = 'none';
            }
            
            renderSportGallery();
            
            $('sport-detail-page').classList.add('active');
            $('close-btn').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            
            updateEditMode();
            $('add-area').classList.remove('show');
        };

        // ========== CLOSE SPORT PAGE ==========
        window.closeSportPage = function() {
            $('sport-detail-page').classList.remove('active');
            $('close-btn').style.display = 'none';
            $('add-area').classList.remove('show');
            document.body.style.overflow = '';
            currentSport = null;
        };

        // ========== TOGGLE ADD AREA (معدل) ==========
        window.toggleAddArea = function() {
            const addArea = $('add-area');
            if (addArea.classList.contains('show')) {
                addArea.classList.remove('show');
            } else {
                $('image-url').value = '';
                $('image-caption').value = '';
                $('preview').classList.remove('show');
                editImageIndex = null;
                addArea.classList.add('show');
                
                console.log('🔧 فتح منطقة الإضافة، تجهيز المعاينة...');
                
                // تأخير بسيط للتأكد من أن العنصر ظهر في DOM
                setTimeout(() => {
                    setupPreviewListener();
                }, 200);
            }
        };

        // ========== CANCEL ADD ==========
        window.cancelAdd = function() {
            $('add-area').classList.remove('show');
            $('image-url').value = '';
            $('image-caption').value = '';
            $('preview').classList.remove('show');
            editImageIndex = null;
        };

        // ========== SETUP PREVIEW LISTENER (معدل) ==========
        function setupPreviewListener() {
            const urlInput = $('image-url');
            const previewImg = $('preview');
            
            console.log('🔧 محاولة إعداد مستمع المعاينة');
            console.log('- urlInput:', urlInput ? 'موجود ✅' : 'غير موجود ❌');
            console.log('- previewImg:', previewImg ? 'موجود ✅' : 'غير موجود ❌');
            
            if (!urlInput || !previewImg) {
                console.log('❌ عناصر المعاينة غير موجودة');
                return;
            }
            
            // إزالة المستمع القديم إذا كان موجوداً
            urlInput.removeEventListener('input', handlePreviewInput);
            // إضافة المستمع الجديد
            urlInput.addEventListener('input', handlePreviewInput);
            console.log('✅ تم إضافة مستمع جديد للمعاينة');
            
            // تشغيل المعاينة فوراً إذا كان هناك قيمة موجودة
            if (urlInput.value.trim()) {
                console.log('🖼️ يوجد رابط موجود، تشغيل المعاينة');
                handlePreviewInput({ target: urlInput });
            }
        }

        // ========== HANDLE PREVIEW INPUT (معدل) ==========
        function handlePreviewInput(e) {
            const previewImg = $('preview');
            if (!previewImg) {
                console.log('❌ عنصر المعاينة غير موجود');
                return;
            }
            
            const url = e.target.value.trim();
            console.log('📝 كتابة الرابط:', url);
            
            if (url) {
                previewImg.src = url;
                previewImg.classList.add('show');
                console.log('🖼️ تم تحديث المعاينة');
            } else {
                previewImg.classList.remove('show');
                console.log('🖼️ تم إخفاء المعاينة');
            }
        }

        // ========== RENDER SPORT GALLERY ==========
        function renderSportGallery() {
            const gallery = $('sport-gallery');
            if (!currentSport) return;
            
            if (currentSport.images && currentSport.images.length > 0) {
                gallery.innerHTML = currentSport.images.map((img, index) => {
                    const caption = img.caption || '';
                    return `
                        <div class="gallery-item" data-index="${index}">
                            <img src="${img.url}" alt="صورة" onerror="this.src='https://via.placeholder.com/400?text=صورة+غير+متوفرة'">
                            <div class="image-caption ${caption ? '' : 'empty'}" 
                                 contenteditable="${isAdmin}" 
                                 onblur="updateCaption(${index}, this.innerText)">${caption}</div>
                            ${isAdmin ? `
                                <div class="image-overlay" onclick="event.stopPropagation()">
                                    <button onclick="editImage(${index})" title="تعديل"><i class="fas fa-edit"></i></button>
                                    <button onclick="deleteImage(${index})" title="حذف"><i class="fas fa-trash"></i></button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('');
                
                // إضافة مستمعي الأحداث للصور بعد إضافتها إلى الصفحة
                setTimeout(() => {
                    document.querySelectorAll('.gallery-item').forEach((item, idx) => {
                        // إزالة أي مستمع قديم
                        item.removeEventListener('click', handleGalleryItemClick);
                        // إضافة المستمع الجديد
                        item.addEventListener('click', handleGalleryItemClick);
                    });
                }, 100);
                
            } else {
                gallery.innerHTML = '<p style="color: #666; text-align: center; padding: 2rem;">لا توجد صور بعد</p>';
            }
        }

        // دالة منفصلة للتعامل مع النقر على الصور
        function handleGalleryItemClick(e) {
            e.preventDefault();
            e.stopPropagation();
            
            const item = e.currentTarget;
            const index = item.getAttribute('data-index');
            
            if (currentSport && currentSport.images && index !== null) {
                openLightbox(currentSport.images, parseInt(index));
            }
        }

        // ========== UPDATE CAPTION ==========
        window.updateCaption = function(index, text) {
            if (currentSport && currentSport.images[index]) {
                currentSport.images[index].caption = text;
            }
        };

        // ========== EDIT IMAGE (معدل) ==========
        window.editImage = function(index) {
            editImageIndex = index;
            const img = currentSport.images[index];
            $('image-url').value = img.url;
            $('image-caption').value = img.caption || '';
            $('preview').src = img.url;
            $('preview').classList.add('show');
            $('add-area').classList.add('show');
            
            console.log('🔧 فتح تعديل الصورة، تجهيز المعاينة...');
            
            // إعادة تفعيل مستمع حدث الإدخال عند فتح منطقة الإضافة
            setTimeout(() => {
                setupPreviewListener();
            }, 200);
        };

        // ========== SAVE LINK (معدل) ==========
        window.saveLink = function() {
            'use strict';
            
            console.log('🔄 نظام مشاركة الصور - محاولة حفظ...');
            
            // الحصول على العناصر
            const urlInput = document.getElementById('image-url');
            const captionInput = document.getElementById('image-caption');
            
            // التحقق من وجود العناصر
            if (!urlInput) {
                alert('❌ خطأ في النظام: خانة الرابط غير موجودة');
                console.error('❌ عنصر image-url غير موجود');
                return;
            }
            
            // الحصول على قيمة الرابط وإزالة المسافات
            let url = urlInput.value.trim();
            console.log('📝 القيمة المدخلة:', url);
            
            // التحقق من أن الرابط ليس فارغاً
            if (!url || url === '') {
                alert('❌ الرابط مطلوب - يرجى إدخال رابط الصورة');
                urlInput.focus();
                urlInput.style.border = '2px solid red';
                setTimeout(() => {
                    urlInput.style.border = '';
                }, 2000);
                return;
            }
            
            // إضافة https:// تلقائياً إذا لم يكن موجوداً
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
                console.log('🔗 تم إضافة https:// تلقائياً:', url);
            }
            
            // الحصول على الوصف
            const caption = captionInput ? captionInput.value.trim() : '';
            
            // التحقق من وجود currentSport
            if (!currentSport) {
                alert('❌ خطأ في النظام: لم يتم تحديد الرياضة الحالية');
                console.error('❌ currentSport غير موجود');
                return;
            }
            
            // التأكد من وجود مصفوفة الصور
            if (!currentSport.images) {
                currentSport.images = [];
            }
            
            // إنشاء بيانات الصورة
            const imageData = { 
                url: url, 
                caption: caption 
            };
            
            console.log('🖼️ بيانات الصورة:', imageData);
            
            // إضافة الصورة
            if (editImageIndex !== null && editImageIndex !== undefined) {
                currentSport.images[editImageIndex] = imageData;
                console.log('✏️ تم تعديل الصورة في الفهرس:', editImageIndex);
            } else {
                currentSport.images.push(imageData);
                console.log('➕ تم إضافة صورة جديدة، العدد الآن:', currentSport.images.length);
            }
            
            // تحديث المعرض
            if (typeof renderSportGallery === 'function') {
                renderSportGallery();
                console.log('🖼️ تم تحديث المعرض');
            }
            
            // إلغاء وضع الإضافة
            if (typeof cancelAdd === 'function') {
                cancelAdd();
            }
            
            // تنظيف الحقول
            urlInput.value = '';
            if (captionInput) captionInput.value = '';
            
            // رسالة نجاح
            alert('✅ تمت إضافة الصورة بنجاح');
            
            console.log('✅ نظام مشاركة الصور - تم الحفظ بنجاح');
            
            // تحديث السحابة تلقائياً
            if (typeof saveToCloud === 'function') {
                setTimeout(() => {
                    saveToCloud();
                }, 500);
            }
        };

        // ========== DELETE IMAGE ==========
        window.deleteImage = function(index) {
            if (confirm('هل أنت متأكد من حذف هذه الصورة؟')) {
                currentSport.images.splice(index, 1);
                renderSportGallery();
                alert('🗑️ تم حذف الصورة');
            }
        };

        // ========== UPDATE EDIT MODE ==========
        function updateEditMode() {
            if (isAdmin && currentSport) {
                $('add-image-btn').style.display = 'inline-flex';
            } else {
                $('add-image-btn').style.display = 'none';
                $('add-area').classList.remove('show');
            }
            renderSportGallery();
        }

        // ========== ADMIN MODE ==========
        function setupAdminTrigger() {
            const trigger = $('admin-trigger');
            if (!trigger) return;
            
            trigger.addEventListener('click', function() {
                if (isAdmin) return;
                
                adminClickCount++;
                
                if (adminTimer) clearTimeout(adminTimer);
                adminTimer = setTimeout(() => {
                    adminClickCount = 0;
                }, 3000);
                
                if (adminClickCount >= 5) {
                    adminClickCount = 0;
                    clearTimeout(adminTimer);
                    
                    const password = prompt('🔐 أدخل كلمة المرور للدخول لوضع المطور:', '');
                    if (password === 'افتح يا سم سم') {
                        activateAdmin();
                    } else if (password) {
                        alert('❌ كلمة المرور غير صحيحة');
                    }
                }
            });
        }

        function activateAdmin() {
            isAdmin = true;
            document.body.classList.add('admin-active');
            
            $('admin-toolbar').style.display = 'flex';
            
            $$('.editable').forEach(el => {
                el.setAttribute('contenteditable', 'true');
            });
            
            if (currentSport) {
                $('add-image-btn').style.display = 'inline-flex';
                renderSportGallery();
            }
            
            // إعداد معاينة الرابط
            console.log('🔧 تفعيل وضع المطور، تجهيز المعاينة...');
            setupPreviewListener();
            
            alert('⚡ وضع المطور مفعل');
        }

        // ========== SETUP BUTTONS ==========
        function setupSaveButton() {
            $('save-btn').addEventListener('click', async function() {
                updateSportData();
                await saveToCloud();
                
                const saveBtn = $('save-btn');
                saveBtn.style.background = '#4CAF50';
                saveBtn.style.borderColor = '#4CAF50';
                saveBtn.style.color = 'white';
                
                setTimeout(() => {
                    saveBtn.style.background = '#D4AF37';
                    saveBtn.style.borderColor = '#D4AF37';
                    saveBtn.style.color = '#0a0a0a';
                }, 500);
            });
        }

        function setupExitButton() {
            $('exit-admin-btn').addEventListener('click', () => {
                isAdmin = false;
                document.body.classList.remove('admin-active');
                
                $('admin-toolbar').style.display = 'none';
                $('add-image-btn').style.display = 'none';
                $('add-area').classList.remove('show');
                
                $$('.editable').forEach(el => {
                    el.removeAttribute('contenteditable');
                });
                
                if (currentSport) {
                    renderSportGallery();
                }
                
                alert('✅ تم الخروج من وضع المطور');
            });
        }

        // ========== SETUP SEARCH ==========
        function setupSearch() {
            const btn = $('search-btn');
            const box = $('search-container');
            const inp = $('search-input');
            let open = false;

            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                open = !open;
                if (open) {
                    box.classList.add('open');
                    setTimeout(() => inp.focus(), 100);
                } else {
                    box.classList.remove('open');
                }
            });

            document.addEventListener('click', (e) => {
                if (open && !btn.contains(e.target) && !box.contains(e.target)) {
                    open = false;
                    box.classList.remove('open');
                }
            });
        }

        // ========== SETUP MOBILE ==========
        function setupMobile() {
            $('mobile-btn').addEventListener('click', () => {
                $('mobile-menu').classList.toggle('hidden');
            });
        }

        window.toggleMobile = () => {
            $('mobile-menu').classList.add('hidden');
        };

        // ========== VIEW SWITCHING ==========
        window.showView = function(view) {
            const home = $('home-view');
            const ach = $('achievements-view');
            
            if (view === 'home') {
                home.style.display = '';
                ach.style.display = 'none';
                home.classList.add('view-enter');
                setTimeout(() => home.classList.remove('view-enter'), 500);
            } else {
                home.style.display = 'none';
                ach.style.display = '';
                ach.classList.add('view-enter');
                setTimeout(() => ach.classList.remove('view-enter'), 500);
                renderAchievementsGallery();
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // ========== ACHIEVEMENTS FUNCTIONS ==========
        let galleryImages = [];
        let pendingUploads = [];
        let lbIndex = 0;

        function makeDefaults() {
            const items = [
                { t:'🥇 بطولة وطنية 2023',    h:300, c1:'#1a1508', c2:'#0d0a04' },
                { t:'🏆 كأس المدينة',          h:380, c1:'#0f1a0f', c2:'#060d06' },
                { t:'🥋 تدريبات الفريق',        h:260, c1:'#1a1010', c2:'#0d0808' },
                { t:'⭐ ميدالية ذهبية',         h:340, c1:'#10101a', c2:'#08080d' },
                { t:'💪 بطولة إقليمية',         h:280, c1:'#1a1a0f', c2:'#0d0d08' },
                { t:'🏅 إنجاز 2024',            h:320, c1:'#0f1a1a', c2:'#080d0d' },
            ];
            return items.map(function(item) {
                var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="'+item.h+'">'
                    + '<defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">'
                    + '<stop offset="0%" style="stop-color:'+item.c1+'"/>'
                    + '<stop offset="100%" style="stop-color:'+item.c2+'"/>'
                    + '</linearGradient></defs>'
                    + '<rect fill="url(#bg)" width="100%" height="100%" rx="10"/>'
                    + '<rect fill="none" stroke="rgba(212,175,55,0.18)" stroke-width="1" x="10" y="10" width="380" height="'+(item.h-20)+'" rx="8"/>'
                    + '<text fill="rgba(212,175,55,0.75)" font-size="20" text-anchor="middle" x="200" y="'+(item.h/2-8)+'" font-family="sans-serif">'+item.t+'</text>'
                    + '</svg>';
                return 'data:image/svg+xml,' + encodeURIComponent(svg);
            });
        }
        var defaultImages = makeDefaults();
        galleryImages = [...defaultImages];

        function renderAchievementsGallery() {
            var container = $('gallery');
            if (!container) return;
            var all = galleryImages.concat(pendingUploads);
            if (all.length === 0) {
                container.innerHTML = '<div class="text-center py-20" style="column-span:all;"><i class="fas fa-image text-gold/15 text-6xl mb-4 block"></i><p class="font-cairo text-white/25">لا توجد صور بعد</p></div>';
                return;
            }
            container.innerHTML = all.map(function(src, i) {
                return '<div class="masonry-item"><img src="'+src+'" alt="إنجاز '+(i+1)+'" class="gallery-img w-full rounded-lg cursor-pointer border border-gold/10 hover:border-gold/30" onclick="lbOpen('+i+')" loading="lazy"></div>';
            }).join('');
        }

        window.resetGallery = function() {
            if (!isAdmin) return;
            galleryImages = [];
            pendingUploads = [];
            $('upload-preview').innerHTML = '';
            renderAchievementsGallery();
            alert('🗑️ تم مسح جميع الصور');
        };

        window.resetDefaults = function() {
            if (!isAdmin) return;
            galleryImages = defaultImages.slice();
            pendingUploads = [];
            $('upload-preview').innerHTML = '';
            renderAchievementsGallery();
            alert('✅ تم استعادة الصور الافتراضية');
        };

        function setupDragDrop() {
            var drop = $('drop-area');
            var fileIn = $('file-input');
            if (!drop || !fileIn) return;

            drop.addEventListener('click', () => fileIn.click());
            drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('dragover'); });
            drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
            drop.addEventListener('drop', (e) => {
                e.preventDefault(); drop.classList.remove('dragover');
                handleFiles(e.dataTransfer.files);
            });
            fileIn.addEventListener('change', () => {
                handleFiles(fileIn.files); fileIn.value = '';
            });
        }

        function handleFiles(files) {
            Array.from(files).forEach(function(f) {
                if (!f.type.startsWith('image/')) return;
                compressImg(f, function(url) {
                    pendingUploads.push(url);
                    renderAchievementsGallery();
                    addPreview(url);
                    alert('📷 صورة جاهزة - اضغط حفظ لتثبيتها');
                });
            });
        }

        function compressImg(file, cb) {
            var reader = new FileReader();
            reader.onload = function(e) {
                var img = new Image();
                img.onload = function() {
                    var c = document.createElement('canvas');
                    var max = 1200, w = img.width, h = img.height;
                    if (w > max || h > max) {
                        if (w > h) { h = Math.round(h * max / w); w = max; }
                        else       { w = Math.round(w * max / h); h = max; }
                    }
                    c.width = w; c.height = h;
                    c.getContext('2d').drawImage(img, 0, 0, w, h);
                    cb(c.toDataURL('image/jpeg', 0.72));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function addPreview(url) {
            var d = document.createElement('div');
            d.className = 'relative rounded-lg overflow-hidden border border-gold/15';
            d.innerHTML = '<img src="'+url+'" class="w-full h-20 object-cover"><div class="absolute inset-0 bg-black/40 flex items-center justify-center"><i class="fas fa-check-circle text-green-400"></i></div>';
            $('upload-preview').appendChild(d);
        }

        // ========== LIGHTBOX للإنجازات ==========
        window.lbOpen = function(i) {
            var all = galleryImages.concat(pendingUploads);
            openLightbox(all.map(url => ({ url })), i);
        };

        // إضافة مستمعي الأحداث للـ Lightbox
        document.addEventListener('DOMContentLoaded', function() {
            const lightboxEl = $('lightbox');
            if (lightboxEl) {
                lightboxEl.addEventListener('touchstart', function(e) {
                    showLightboxNav();
                });
                
                lightboxEl.addEventListener('mousemove', function(e) {
                    showLightboxNav();
                });
            }
        });

        // ========== INIT ==========
        async function init() {
            await loadFromCloud();
            
            renderSportsCards();
            setupAdminTrigger();
            setupSaveButton();
            setupExitButton();
            setupSearch();
            setupMobile();
            setupDragDrop();
            
            document.addEventListener('keydown', function(e) {
                if (!$('lightbox').classList.contains('active')) return;
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowLeft') navigateLightbox(1);
                if (e.key === 'ArrowRight') navigateLightbox(-1);
            });
            
            setTimeout(() => {
                $('loader').style.display = 'none';
            }, 1800);
        }

        document.addEventListener('DOMContentLoaded', init);

    })();
    </script>

    <!-- ======================== أدوات التصحيح (تظهر فقط في وضع المطور) ======================== -->
    <div id="debug-tools" style="position: fixed; bottom: 100px; left: 20px; z-index: 10000; display: none; gap: 10px; flex-direction: column;">
        <button onclick="testLinkInput()" style="background: #D4AF37; color: #0a0a0a; border: none; padding: 10px 15px; border-radius: 5px; font-family: Cairo; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
            🧪 اختبار الرابط
        </button>
        <button onclick="checkDevMode()" style="background: #333; color: white; border: none; padding: 10px 15px; border-radius: 5px; font-family: Cairo; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
            🔍 فحص الوضع
        </button>
        <button onclick="fixSaveLink()" style="background: #4CAF50; color: white; border: none; padding: 10px 15px; border-radius: 5px; font-family: Cairo; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
            🔧 إصلاح الحفظ
        </button>
        <button onclick="restartSaveSystem()" style="background: #2196F3; color: white; border: none; padding: 10px 15px; border-radius: 5px; font-family: Cairo; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-top: 5px;">
            🔄 إعادة تشغيل النظام
        </button>
        <button onclick="testSaveSystem()" style="background: #9C27B0; color: white; border: none; padding: 10px 15px; border-radius: 5px; font-family: Cairo; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-top: 5px;">
            🔍 فحص النظام
        </button>
    </div>

    <script>
    // ========== أدوات التصحيح الإضافية ==========
    console.log('🔍 أدوات التصحيح جاهزة');

    // دالة اختبار الرابط المبسطة
    window.testLinkNow = function() {
        const input = document.getElementById('image-url');
        if (!input) {
            alert('❌ خانة الرابط غير موجودة');
            return;
        }
        const val = input.value;
        alert('قيمة الرابط: "' + val + '"' + (val ? '' : ' (فارغة)'));
    };

    // دالة اختبار سريعة
    window.testLinkInput = function() {
        const urlInput = document.getElementById('image-url');
        if (!urlInput) {
            alert('❌ خانة الرابط غير موجودة');
            return;
        }
        
        const url = urlInput.value.trim();
        if (!url) {
            alert('❌ الخانة فارغة');
            return;
        }
        
        alert('✅ الرابط الذي أدخلته هو:\n' + url);
        console.log('✅ الرابط:', url);
    };

    // دالة للتحقق من حالة وضع المطور
    window.checkDevMode = function() {
        console.log('👤 هل أنت في وضع المطور؟', typeof isAdmin !== 'undefined' ? (isAdmin ? 'نعم' : 'لا') : 'غير معروف');
        console.log('🏋️ الرياضة الحالية:', typeof currentSport !== 'undefined' && currentSport ? currentSport.nameAr : 'لا توجد');
        console.log('🔗 عنصر الرابط موجود؟', document.getElementById('image-url') ? 'نعم' : 'لا');
        console.log('📝 عنصر الوصف موجود؟', document.getElementById('image-caption') ? 'نعم' : 'لا');
        
        alert('✅ تم تسجيل المعلومات في الـ Console (اضغط F12)');
    };

    // دالة إصلاح مشكلة الحفظ
    window.fixSaveLink = function() {
        console.log('🔧 محاولة إصلاح مشكلة الحفظ...');
        
        // إعادة تعريف دالة saveLink بشكل محسن
        window.saveLink = function() {
            console.log('🔍 محاولة حفظ الرابط...');
            
            const urlInput = document.getElementById('image-url');
            const captionInput = document.getElementById('image-caption');
            
            if (!urlInput) {
                alert('❌ خطأ: لم يتم العثور على خانة الرابط');
                return;
            }
            
            let url = urlInput.value.trim();
            console.log('📝 الرابط المدخل:', url);
            
            if (!url) {
                alert('❌ الرابط مطلوب');
                urlInput.focus();
                return;
            }
            
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
                console.log('🔗 تم إضافة https://:', url);
            }
            
            const caption = captionInput ? captionInput.value.trim() : '';
            
            if (!currentSport) {
                alert('❌ خطأ: لم يتم تحديد الرياضة الحالية');
                return;
            }
            
            const imageData = { url, caption };
            console.log('🖼️ بيانات الصورة:', imageData);
            
            if (editImageIndex !== null && editImageIndex !== undefined) {
                currentSport.images[editImageIndex] = imageData;
                console.log('✏️ تم تعديل الصورة في الفهرس:', editImageIndex);
            } else {
                currentSport.images.push(imageData);
                console.log('➕ تم إضافة صورة جديدة، العدد الآن:', currentSport.images.length);
            }
            
            if (typeof renderSportGallery === 'function') renderSportGallery();
            if (typeof cancelAdd === 'function') cancelAdd();
            
            alert('✅ تمت إضافة الصورة بنجاح');
        };
        
        alert('✅ تم إصلاح دالة الحفظ! جرب إضافة الصورة الآن.');
    };

    // دالة إعادة تشغيل النظام
    window.restartSaveSystem = function() {
        console.log('🔄 إعادة تشغيل نظام مشاركة الصور...');
        alert('✅ تم إعادة تشغيل نظام مشاركة الصور');
    };

    // دالة فحص النظام
    window.testSaveSystem = function() {
        console.log('🔍 فحص نظام الحفظ:');
        console.log('- دالة saveLink موجودة؟', typeof window.saveLink === 'function' ? '✅' : '❌');
        console.log('- عنصر image-url موجود؟', document.getElementById('image-url') ? '✅' : '❌');
        console.log('- currentSport موجود؟', typeof currentSport !== 'undefined' && currentSport ? '✅' : '❌');
        console.log('- isAdmin موجود؟', typeof isAdmin !== 'undefined' ? '✅ (' + isAdmin + ')' : '❌');
        
        alert('✅ تم تسجيل معلومات النظام في الـ Console (F12)');
    };

    // إظهار/إخفاء أدوات التصحيح حسب وضع المطور
    function toggleDebugTools() {
        const debugTools = document.getElementById('debug-tools');
        if (!debugTools) return;
        
        if (typeof isAdmin !== 'undefined' && isAdmin) {
            debugTools.style.display = 'flex';
        } else {
            debugTools.style.display = 'none';
        }
    }

    // مراقبة تغير حالة isAdmin
    let isAdminValue = false;
    Object.defineProperty(window, 'isAdmin', {
        set: function(value) {
            isAdminValue = value;
            toggleDebugTools();
        },
        get: function() {
            return isAdminValue;
        }
    });

    // التحقق عند تحميل الصفحة
    setTimeout(toggleDebugTools, 500);
    </script>

    <!-- ======================== حل طارئ للمعاينة ======================== -->
    <script>
    // حل طارئ لمشكلة المعاينة
    document.addEventListener('DOMContentLoaded', function() {
        console.log('🔧 تجهيز حل الطوارئ للمعاينة');
        
        // مراقبة ظهور منطقة الإضافة
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.target.id === 'add-area' && 
                    mutation.target.classList.contains('show')) {
                    
                    console.log('🚑 تم اكتشاف فتح منطقة الإضافة (حل طارئ)');
                    
                    setTimeout(function() {
                        const input = document.getElementById('image-url');
                        const preview = document.getElementById('preview');
                        
                        if (input && preview) {
                            // إزالة المستمع القديم
                            input.removeEventListener('input', window.emergencyPreview);
                            
                            // إضافة مستمع جديد
                            window.emergencyPreview = function(e) {
                                const url = e.target.value.trim();
                                console.log('🚑 معاينة طارئة:', url);
                                if (url) {
                                    preview.src = url;
                                    preview.classList.add('show');
                                } else {
                                    preview.classList.remove('show');
                                }
                            };
                            
                            input.addEventListener('input', window.emergencyPreview);
                            console.log('🚑 تم تفعيل المعاينة الطارئة');
                            
                            // تشغيل المعاينة فوراً إذا كان هناك قيمة
                            if (input.value.trim()) {
                                window.emergencyPreview({ target: input });
                            }
                        }
                    }, 300);
                }
            });
        });
        
        const addArea = document.getElementById('add-area');
        if (addArea) {
            observer.observe(addArea, { attributes: true, attributeFilter: ['class'] });
            console.log('🚑 مراقب الطوارئ نشط');
        }
    });
    </script>
