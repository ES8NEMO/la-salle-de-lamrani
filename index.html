<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIVE STARS GYM | قاعة العمراني</title>
    
    <!-- Preconnect for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    
    <!-- Resources -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Cinzel:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Hammer.js for touch gestures -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>

    <style>/* نفس الأنماط السابقة مع بعض التحسينات البسيطة */</style>
</head>
<body>
    <!-- كل المحتوى المرئي كما هو دون أي تغيير -->
    <!-- ... (نفس الـ HTML السابق) ... -->

    <script>
    (function() {
        'use strict';

        // ========== المتغيرات العامة (ستكون متاحة داخل الإغلاق) ==========
        let isAdmin = false;
        let currentSport = null;
        let adminClickCount = 0;
        let adminTimer = null;
        let editImageIndex = null;
        let currentEditIndex = null;
        
        // متغيرات Lightbox
        let currentLightboxImages = [];
        let currentLightboxIndex = 0;
        let lightboxTimer = null;
        
        // متغيرات التكبير والتحريك
        let scale = 1, translateX = 0, translateY = 0;
        let lastTouchDistance = null, isDragging = false;
        let startDragX, startDragY, startTranslateX, startTranslateY;
        let hammerManager = null, wheelHandler = null;

        // بيانات الرياضات (نفس المحتوى)
        const sports = [ /* ... */ ];

        // ========== دوال عامة يجب أن تكون متاحة من HTML ==========
        window.showToast = function(message, type = 'default', duration = 3000) {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            let icon = 'fa-circle-info';
            if (type === 'success') icon = 'fa-check-circle';
            if (type === 'error') icon = 'fa-exclamation-circle';
            if (type === 'warning') icon = 'fa-triangle-exclamation';
            toast.innerHTML = `<i class="fas ${icon}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, duration);
        };

        // Lightbox functions
        window.openLightbox = function(images, index) {
            if (!images || images.length === 0) return;
            currentLightboxImages = images;
            currentLightboxIndex = index;
            resetZoom();
            updateLightbox();
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
            showLightboxNav();
            // تأخير بسيط لربط الإيماءات بعد تحميل الصورة
            setTimeout(() => setupLightboxGestures(), 200);
        };

        window.closeLightbox = function() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
            if (lightboxTimer) clearTimeout(lightboxTimer);
            if (hammerManager) { hammerManager.destroy(); hammerManager = null; }
            if (wheelHandler) {
                const img = document.getElementById('lightbox-img');
                if (img) img.removeEventListener('wheel', wheelHandler);
            }
        };

        window.navigateLightbox = function(direction) {
            if (!currentLightboxImages || currentLightboxImages.length === 0) return;
            currentLightboxIndex = (currentLightboxIndex + direction + currentLightboxImages.length) % currentLightboxImages.length;
            resetZoom();
            updateLightbox();
            showLightboxNav();
            setTimeout(() => setupLightboxGestures(), 200);
        };

        // دوال أخرى (تعديل الوصف، حفظ، إلخ) بنفس الطريقة
        window.openCaptionModal = function(index) { /* ... */ };
        window.closeCaptionModal = function() { /* ... */ };
        window.saveCaption = function() { /* ... */ };
        window.toggleAddArea = function() { /* ... */ };
        window.cancelAdd = function() { /* ... */ };
        window.saveLink = function() { /* ... */ };
        window.editImage = function(index) { /* ... */ };
        window.deleteImage = function(index) { /* ... */ };
        window.openSportPage = function(sportId) { /* ... */ };
        window.closeSportPage = function() { /* ... */ };
        window.showView = function(view) { /* ... */ };
        window.toggleMobile = function() { /* ... */ };
        window.resetGallery = function() { /* ... */ };
        window.resetDefaults = function() { /* ... */ };
        window.lbOpen = function(i) { /* ... */ };

        // ========== دوال مساعدة داخلية ==========
        function resetZoom() { scale = 1; translateX = 0; translateY = 0; applyTransform(); }
        function applyTransform() {
            const img = document.getElementById('lightbox-img');
            if (img) img.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }
        function updateLightbox() {
            if (!currentLightboxImages || currentLightboxImages.length === 0) return;
            const img = currentLightboxImages[currentLightboxIndex];
            const imgUrl = img.url || img;
            document.getElementById('lightbox-img').src = imgUrl;
            document.getElementById('lightbox-counter').textContent = `${currentLightboxIndex + 1} / ${currentLightboxImages.length}`;
            document.getElementById('lightbox-caption').textContent = img.caption || '';
        }
        function showLightboxNav() { /* ... */ }
        function setupLightboxGestures() { /* ... */ }

        // ========== ربط الأحداث بالصور بعد كل تحديث للمعرض ==========
        function bindGalleryEvents() {
            // ربط صور معرض الإنجازات
            document.querySelectorAll('#gallery .gallery-img').forEach((img, i) => {
                img.removeEventListener('click', handleAchievementClick);
                img.addEventListener('click', handleAchievementClick);
            });
            // ربط صور معرض الرياضة الحالية
            if (currentSport) {
                document.querySelectorAll('#sport-gallery .gallery-item img').forEach((img, i) => {
                    img.removeEventListener('click', handleSportClick);
                    img.addEventListener('click', handleSportClick);
                });
            }
        }

        function handleAchievementClick(e) {
            const img = e.currentTarget;
            const index = Array.from(document.querySelectorAll('#gallery .gallery-img')).indexOf(img);
            const allImages = galleryImages.concat(pendingUploads);
            window.openLightbox(allImages.map(url => ({ url })), index);
        }

        function handleSportClick(e) {
            const img = e.currentTarget;
            const parent = img.closest('.gallery-item');
            if (!parent) return;
            const index = parent.dataset.index;
            if (index !== undefined && currentSport) {
                window.openLightbox(currentSport.images, parseInt(index));
            }
        }

        // ========== تعديل دوال render لاستدعاء bindGalleryEvents بعد التحديث ==========
        const originalRenderSportGallery = renderSportGallery;
        renderSportGallery = function() {
            originalRenderSportGallery();
            bindGalleryEvents();
        };

        const originalRenderAchievementsGallery = renderAchievementsGallery;
        renderAchievementsGallery = function() {
            originalRenderAchievementsGallery();
            bindGalleryEvents();
        };

        // ========== باقي الكود (نفسه مع إضافة bind بعد كل تحديث) ==========
        // ... (كل الدوال الأخرى كما هي، مع استدعاء bind بعد render)

        // ========== التهيئة ==========
        async function init() {
            await loadFromCloud();
            renderSportsCards();
            setupAdminTrigger();
            setupSaveButton();
            setupExitButton();
            setupSearch();
            setupMobile();
            setupDragDrop();
            // ربط الأحداث الأولية
            bindGalleryEvents();
            
            document.addEventListener('keydown', function(e) {
                if (!document.getElementById('lightbox').classList.contains('active')) return;
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowLeft') navigateLightbox(-1);
                if (e.key === 'ArrowRight') navigateLightbox(1);
            });
            
            setTimeout(() => document.getElementById('loader').style.display = 'none', 1800);
            setTimeout(() => window.showToast('🌟 مرحباً بك في Five Stars Gym', 'default'), 2000);
        }

        document.addEventListener('DOMContentLoaded', init);

    })();
    </script>
</body>
</html>
